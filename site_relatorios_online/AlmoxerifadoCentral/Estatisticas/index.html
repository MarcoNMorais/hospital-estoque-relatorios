<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Almoxerifado Central — Estatística</title><link rel="stylesheet" href="../../assets/portal.css"><script src="../../assets/portal.js"></script></head><body><div class="layout"><aside class="sidebar"></aside><main class="main"><section class="hero"><h2>Almoxerifado Central — Estatística</h2><p>Área modular do Portal Executivo.</p><div class="badges"><span class="badge">📅 Maio/2026</span><span class="badge">🔄 Atualizado: aguardando dados</span><span class="badge">📍 Valente - BA</span></div></section><div class="notice">Esta página lê somente o dados.json deste módulo.</div><div class="cards"><div class="card"><h3>Entradas</h3><div class="num" id="ent">0</div></div><div class="card"><h3>Saídas</h3><div class="num" id="sai">0</div></div><div class="card"><h3>Quantidade</h3><div class="num" id="qtd">0</div></div><div class="card"><h3>Registros</h3><div class="num" id="reg">0</div></div></div><div class="card"><h3>Últimas movimentações</h3><table><thead><tr><th>Data</th><th>Produto</th><th>Origem</th><th>Destino</th><th>Qtd</th></tr></thead><tbody id="tbody"></tbody></table></div><script>async function init(){await montarMenu('AC_Estatisticas');const d=await carregarDadosJson();const m=d.movimentacoes||[];document.getElementById('ent').textContent=m.filter(x=>(x.tipo||'').toLowerCase().includes('entrada')).length;document.getElementById('sai').textContent=m.filter(x=>(x.tipo||'').toLowerCase().includes('sa')).length;document.getElementById('qtd').textContent=m.reduce((a,x)=>a+Number(x.quantidade||x.qtd||0),0);document.getElementById('reg').textContent=m.length;document.getElementById('tbody').innerHTML=m.length?m.slice(-50).reverse().map(x=>`<tr><td>${x.data||'-'}</td><td><b>${x.produto_nome||x.nome||x.item||'-'}</b></td><td>${x.origem||'-'}</td><td>${x.destino||'-'}</td><td>${x.quantidade||x.qtd||0}</td></tr>`).join(''):'<tr><td colspan="5">Sem movimentações.</td></tr>'}init()</script></main></div></body></html>
