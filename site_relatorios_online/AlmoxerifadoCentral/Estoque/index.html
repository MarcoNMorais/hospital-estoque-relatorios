<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Almoxerifado Central — Estoque</title><link rel="stylesheet" href="../../assets/portal.css"><script src="../../assets/portal.js"></script></head><body><div class="layout"><aside class="sidebar"></aside><main class="main"><section class="hero"><h2>Almoxerifado Central — Estoque</h2><p>Área modular do Portal Executivo.</p><div class="badges"><span class="badge">📅 Maio/2026</span><span class="badge">🔄 Atualizado: aguardando dados</span><span class="badge">📍 Valente - BA</span></div></section><div class="notice">Esta página lê somente o dados.json deste módulo.</div><div class="cards"><div class="card"><h3>Itens</h3><div class="num" id="itens">0</div></div><div class="card"><h3>Saldo total</h3><div class="num" id="saldo">0</div></div><div class="card"><h3>Baixo mínimo</h3><div class="num" id="min">0</div></div><div class="card"><h3>Movimentações</h3><div class="num" id="mov">0</div></div></div><div class="card"><h3>Estoque</h3><table><thead><tr><th>Item</th><th>Tipo</th><th>Unidade</th><th>Saldo</th><th>Mínimo</th></tr></thead><tbody id="tbody"></tbody></table></div><script>async function init(){await montarMenu('AC_Estoque');const d=await carregarDadosJson();const itens=d.itens||[];document.getElementById('itens').textContent=itens.length;document.getElementById('saldo').textContent=itens.reduce((a,i)=>a+Number(i.total||i.saldo||i.farmacia||i.almoxarifado||0),0);document.getElementById('min').textContent=itens.filter(i=>Number(i.total||i.saldo||0)<=Number(i.minimo||0)).length;document.getElementById('mov').textContent=(d.movimentacoes||[]).length;document.getElementById('tbody').innerHTML=itens.length?itens.map(i=>`<tr><td><b>${i.nome||i.item||'-'}</b></td><td>${i.tipo||'-'}</td><td>${i.unidade||'-'}</td><td>${i.total||i.saldo||i.farmacia||i.almoxarifado||0}</td><td>${i.minimo||0}</td></tr>`).join(''):'<tr><td colspan="5">Sem dados recebidos ainda.</td></tr>'}init()</script></main></div></body></html>
